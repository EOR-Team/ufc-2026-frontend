# UFC 2026 Frontend - Nginx Configuration
# Port 8000: Production build (SSL)
# Port 8001: Dev server proxy (SSL)

events {
    worker_connections 1024;
}

http {
    # Production server - serves built static files from dist/
    server {
        listen 8000 ssl;
        server_name localhost;

        ssl_certificate /home/n1ghts4kura/ufc-2026-frontend/nginx/ssl/nginx.crt;
        ssl_certificate_key /home/n1ghts4kura/ufc-2026-frontend/nginx/ssl/nginx.key;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # Serve static files from dist/
        root /home/n1ghts4kura/ufc-2026-frontend/dist;
        index index.html;

        # Gzip compression
        gzip on;
        gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
        gzip_min_length 1024;

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # SPA routing fallback - Vue Router history mode
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
    }

    # Dev server proxy - forwards to Vite dev server
    server {
        listen 8001 ssl;
        server_name localhost;

        ssl_certificate /home/n1ghts4kura/ufc-2026-frontend/nginx/ssl/nginx.crt;
        ssl_certificate_key /home/n1ghts4kura/ufc-2026-frontend/nginx/ssl/nginx.key;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # Proxy to Vite dev server
        location / {
            proxy_pass http://localhost:5173;
            proxy_http_version 1.1;

            # WebSocket support for Vite HMR
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # Preserve original host header
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeouts for dev server
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }
    }
}
